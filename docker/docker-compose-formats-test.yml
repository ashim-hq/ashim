name: ashim-formats-test

services:
  ashim:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ashim-formats-test:latest
    container_name: ashim-formats-test
    ports:
      - "1355:1349"
    volumes:
      - ashim-formats-data:/data
      - ashim-formats-workspace:/tmp/workspace
    environment:
      - AUTH_ENABLED=true
      - DEFAULT_USERNAME=admin
      - DEFAULT_PASSWORD=admin
      - SKIP_MUST_CHANGE_PASSWORD=true
      - MAX_UPLOAD_SIZE_MB=0
      - MAX_BATCH_SIZE=0
      - MAX_MEGAPIXELS=0
      - CONCURRENT_JOBS=0
      - RATE_LIMIT_PER_MIN=0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1349/api/v1/health"]
      interval: 15s
      timeout: 5s
      start_period: 120s
      retries: 5
    shm_size: '2gb'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  ashim-formats-data:
  ashim-formats-workspace:
